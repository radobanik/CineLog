version: '3.9'
services:
  api:
    build:
      context: ..
      dockerfile: src/api/CineLog.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=cinelog;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Secret=super-secret-key-min-32-characters-long!!
      - Jwt__Issuer=CineLog
      - Jwt__Audience=CineLog
      - Jwt__ExpiryMinutes=1440
      - Tmdb__ApiKey=${TMDB_API_KEY}
      - Tmdb__BaseUrl=https://api.themoviedb.org/
      - Elasticsearch__Uri=http://elasticsearch:9200
      - Serilog__Seq__ServerUrl=http://seq:5341
      - BlobStorage__Endpoint=http://minio:9000
      - BlobStorage__AccessKey=cinelog
      - BlobStorage__SecretKey=cinelog123
      - BlobStorage__BucketName=cinelog
      - BlobStorage__PublicBaseUrl=http://localhost:9000/cinelog
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      seq:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cinelog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  tmdb-sync:
    build:
      context: ..
      dockerfile: src/tools/CineLog.TmdbSync/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=cinelog;Username=postgres;Password=postgres
      - Tmdb__BearerToken=${TMDB_API_KEY}
      - Sync__IntervalMinutes=1440
      - Sync__MoviesMaxDiscoverPages=500
      - Sync__PersonMaxDiscoverPages=500
      - Sync__BatchSize=5
      - Serilog__Seq__ServerUrl=http://seq:5341
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
      api:
        condition: service_started
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  seq:
    image: datalust/seq:latest
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=admin
    ports:
      - "5341:5341"
      - "5342:80"
    volumes:
      - seq_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cinelog
      MINIO_ROOT_PASSWORD: cinelog123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 cinelog cinelog123;
        mc mb --ignore-existing local/cinelog;
        mc anonymous set public local/cinelog;
      "

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cinelog.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:
  elasticsearch_data:
  seq_data:
  minio_data:
