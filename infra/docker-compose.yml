version: '3.9'
services:
  api:
    build:
      context: ..
      dockerfile: src/api/CineLog.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=cinelog;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Secret=super-secret-key-min-32-characters-long!!
      - Jwt__Issuer=CineLog
      - Jwt__Audience=CineLog
      - Jwt__ExpiryMinutes=1440
      - Tmdb__ApiKey=${TMDB_API_KEY}
      - Tmdb__BaseUrl=https://api.themoviedb.org/
      - Elasticsearch__Uri=http://elasticsearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cinelog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  tmdb-sync:
    build:
      context: ..
      dockerfile: src/tools/CineLog.TmdbSync/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=cinelog;Username=postgres;Password=postgres
      - Tmdb__BearerToken=${TMDB_API_KEY}
      - Sync__IntervalMinutes=1440
      - Sync__MoviesMaxDiscoverPages=500
      - Sync__PersonMaxDiscoverPages=500
      - Sync__BatchSize=5
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cinelog.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:
  elasticsearch_data:
